version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: django_db
    environment:
      - POSTGRES_DB=ecommerce_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Anushree@12
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: django_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=ecommerce_db
      - DB_USER=postgres
      - DB_PASSWORD=Anushree@12
      - DB_HOST=db  # Points to the db container
      - DB_PORT=5432
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: react_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_DJANGO_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: